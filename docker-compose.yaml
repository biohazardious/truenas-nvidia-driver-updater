# docker-compose.yaml — Template (git-tracked)
#
# User-specific configuration is loaded from .env (generated by configure.sh).
# Run ./configure.sh to create or update .env, or copy .env.example manually.
#
# This file should NOT be edited for configuration — edit .env instead.
services:
  nvidia-builder:
    build: .
    container_name: truenas-nvidia-builder
    environment:
      - NVIDIA_VERSION=${NVIDIA_VERSION:?Run ./configure.sh first or create .env}
      # open         -> Open GPU kernel modules. Preferred for most newer GPUs.
      # proprietary  -> Legacy closed-source modules for older hardware.
      - NVIDIA_KERNEL_MODULE_TYPE=${NVIDIA_KERNEL_MODULE_TYPE:-open}
      # Optional compiler override for the NVIDIA module build, e.g. gcc-14.
      # Leave unset/empty to let entrypoint auto-detect a suitable compiler.
      - NVIDIA_BUILD_CC=${NVIDIA_BUILD_CC:-}
      # true/false — install nvidia-drm.ko so /dev/dri can be created on the host.
      # Set false only if the target TrueNAS kernel cannot load nvidia_drm.
      - NVIDIA_INSTALL_DRM=${NVIDIA_INSTALL_DRM:-true}
      - TRUENAS_VERSION=${TRUENAS_VERSION:?Run ./configure.sh first or create .env}
      # Required for 25.x and earlier downloads. Leave empty for TrueNAS 26+.
      - TRUENAS_CODENAME=${TRUENAS_CODENAME:-}
      # true/false — when enabled, also generate a rebuilt truenas.update with
      # the bundled nvidia.raw replaced.
      - EMBED_NVIDIA_RAW_IN_UPDATE=${EMBED_NVIDIA_RAW_IN_UPDATE:-false}
      # true/false — set true to bypass the early driver/kernel compatibility
      # abort (e.g. building a legacy branch with patched sources).
      - SKIP_KERNEL_COMPAT_CHECK=${SKIP_KERNEL_COMPAT_CHECK:-false}
      # Source-patch mode: none | custom | predefined | auto (default auto).
      # 'predefined' applies the curated set in ./predefined-patches/<driver>/;
      # 'custom' uses ./patches/<kernel>/. See ./configure.sh and the README.
      - NVIDIA_PATCH_MODE=${NVIDIA_PATCH_MODE:-auto}
    # Force standard runtime — TrueNAS may default to nvidia-container-runtime,
    # which fails when the driver is being rebuilt (chicken-and-egg).
    runtime: runc
    volumes:
      # If truenas.update exists here, it will be used instead of downloading
      - .:/workspace
      - ./output:/output
      # Persistent download cache: the ~1.8 GB TrueNAS update and ~300 MB NVIDIA
      # installer are stored here and reused across runs instead of being
      # re-downloaded every time. Safe to delete to force fresh downloads.
      - ./cache:/cache
      # Optional: community source patches to build an EOL driver (e.g. 470) on a
      # newer kernel. Put them in a kernel-keyed subdir, e.g. ./patches/6.12/*.patch
      # for TrueNAS 25.x; the build auto-selects the dir matching the image kernel.
      # Empty/absent = no patches applied.
      - ./patches:/patches
    privileged: true
